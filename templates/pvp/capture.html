{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<style>
  .capture-wrap { max-width: 900px; margin: 20px auto; padding: 0 15px; }
  .capture-wrap h2 { text-align: center; margin-bottom: 5px; }
  .capture-wrap .subtitle { text-align: center; color: #999; font-size: 13px; margin-bottom: 20px; }
  .upload-zone {
    border: 2px dashed #ccc; border-radius: 12px; padding: 40px 20px;
    text-align: center; cursor: pointer; transition: .2s;
  }
  .upload-zone:hover { border-color: #7c4dff; background: #faf5ff; }
  .upload-zone input { display: none; }
  .upload-zone .icon { font-size: 48px; margin-bottom: 10px; }
  .upload-zone .text { color: #888; }
  .upload-zone .hint { font-size: 12px; color: #bbb; margin-top: 6px; }
  .btn { display: inline-block; padding: 10px 30px; border: none; border-radius: 8px;
         background: #7c4dff; color: #fff; font-size: 15px; cursor: pointer; margin-top: 15px; }
  .btn:hover { background: #6a3de8; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #preview { max-width: 100%; max-height: 300px; margin-top: 15px; border-radius: 8px; display: none; }
  .error-msg { color: #e74c3c; text-align: center; margin-top: 10px; }
</style>
{% endblock %}

{% block content %}
<div class="capture-wrap">
  <h2>PVP 截图识别</h2>
  <p class="subtitle">上传对方阵容截图，自动识别 6 只精灵并查询 BWIKI 数据</p>

  <form method="POST" enctype="multipart/form-data" action="/pvp/capture/analyze/">
    {% csrf_token %}
    <label class="upload-zone" id="drop-zone">
      <div class="icon">📸</div>
      <div class="text">点击或拖拽上传 PVP 阵容截图</div>
      <div class="hint">支持 PNG / JPG / BMP</div>
      <input type="file" name="screenshot" accept="image/*" id="file-input" required>
    </label>
    <img id="preview" src="" alt="预览">
    <div id="status" style="text-align:center;margin-top:8px;color:#888;font-size:13px;"></div>
    <div style="text-align:center;">
      <button type="submit" class="btn" id="submit-btn" disabled>开始识别</button>
    </div>
  </form>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}
</div>

<script>
  var input = document.getElementById('file-input');
  var preview = document.getElementById('preview');
  var drop = document.getElementById('drop-zone');
  var btn = document.getElementById('submit-btn');
  var statusDiv = document.getElementById('status');

  input.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      btn.disabled = false;
      statusDiv.textContent = file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)';
    }
  });

  drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.style.borderColor = '#7c4dff'; });
  drop.addEventListener('dragleave', function() { drop.style.borderColor = '#ccc'; });
  drop.addEventListener('drop', function(e) {
    e.preventDefault();
    drop.style.borderColor = '#ccc';
    input.files = e.dataTransfer.files;
    input.dispatchEvent(new Event('change'));
  });
</script>
{% endblock %}
