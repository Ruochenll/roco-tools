{% load static %}
<div class="search-dropdown-inner" style="background:var(--color-card);border-radius:0 0 8px 8px;overflow:hidden;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;font-size:0.8rem;color:var(--color-text-light);border-bottom:1px solid var(--color-border);position:sticky;top:0;background:var(--color-card);z-index:1;">
        <span>{% if q %}搜索 "{{ q }}" — {{ pets|length }} 个结果{% else %}共 {{ pets|length }} 种精灵蛋，点击选择{% endif %}</span>
        <span class="dropdown-close" style="cursor:pointer;font-size:1.2rem;line-height:1;padding:0 4px;" title="关闭">×</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:4px;padding:8px;max-height:360px;overflow-y:auto;">
        {% for pet in pets %}
        <div class="egg-option"
             style="display:flex;flex-direction:column;align-items:center;padding:6px 2px;cursor:pointer;border-radius:8px;transition:background 0.15s;"
             onmouseover="this.style.background='var(--color-bg)'"
             onmouseout="this.style.background=''"
             data-pet-id="{{ pet.id }}"
             data-pet-label="#{{ pet.number }} {{ pet.name }}"
             {% if pet.egg_image %}
             data-egg-img="{% static 'images/eggs/'|add:pet.egg_image.image %}"
             {% endif %}>
            {% if pet.egg_image %}
            <img src="{% static 'images/eggs/'|add:pet.egg_image.image %}"
                 style="width:44px;height:44px;object-fit:contain;border-radius:50%;background:#f5f0e8;"
                 title="{{ pet.name }}">
            {% endif %}
            <span style="font-size:0.65rem;color:var(--color-text-light);text-align:center;line-height:1.1;margin-top:2px;max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ pet.name }}</span>
        </div>
        {% empty %}
        <div style="padding:16px;text-align:center;color:var(--color-text-light);grid-column:1/-1;">无匹配精灵蛋</div>
        {% endfor %}
    </div>
</div>
